name: Suparchef Bot

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'UUID do job específico (deixe vazio para processar todos os idle)'
        required: false
        default: ''
  schedule:
    # Roda a cada hora (ajuste conforme necessário)
    # Para horários específicos, ex: "0 14,18 * * *" = 14h e 18h UTC
    - cron: '0 * * * *'

jobs:
  votar:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Suparchef Bot
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CI: 'true'
        run: |
          if [ -n "${{ github.event.inputs.job_id }}" ]; then
            node scripts/suparchef-bot.js --job "${{ github.event.inputs.job_id }}"
          else
            node scripts/suparchef-bot.js --all
          fi
